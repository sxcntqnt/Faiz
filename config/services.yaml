# ─────────────────────────────────────────────
#  FlamOS Service Registry
#  All services declared here. flam reads this.
# ─────────────────────────────────────────────

defaults:
  watchdog_interval: 10
  restart_limit: 5
  restart_cooldown: 30
  state_file: ./state/workspace.json
  log_dir: ./logs

# ─────────────────────────────────────────────
#  Groups — explicit named collections.
#  Use with any flam command:
#    flam up apps
#    flam doctor crm
#    flam panic pangea
#    flam watch tunnels
# ─────────────────────────────────────────────

groups:
  apps:       [root-web, auth-service, chat, maps, games, hypntyz]
  crm:        [crm-frontend, crm-backend, crm-celery, crm-redis, cf-crm]
  marketing:  [n8n]
  auth-stack: [vault, dgraph-zero, dgraph-alpha, auth-bootstrap, auth-service]
  gatebill:   [gatebill-frontend, gatebill-worker-1, gatebill-worker-2]
  tunnels:    [cf-root, cf-auth, cf-chat, cf-maps, cf-games, cf-hypntyz,
                cf-ingestion, cf-crm]
  infra:      [nginx, vault, dgraph-zero, dgraph-alpha]

services:

  # ─────────────────────────────
  # INFRA
  # ─────────────────────────────

  nginx:
    session: FlamNginx
    command: "nginx -g 'daemon off;'"
    dir: /
    health_check: "service nginx status"
    color: green
    critical: true
    tags: [infra]
    log_file: /var/log/nginx/error.log

  # ─────────────────────────────
  # ROOT SITE
  # ─────────────────────────────

  root-web:
    session: FlamRootWeb
    command: "pnpm run prod-start"
    dir: /sec/root/FLTM/SHFTCCONK
    health_check: "curl -sf http://localhost:5100 -o /dev/null"
    color: blue
    critical: true
    tags: [frontend]
    port: 5100

  cf-root:
    session: FlamTunnelRoot
    command: >
      cloudflared tunnel run --token ${ROOT_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa ROOT_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
  # AUTH
  # ─────────────────────────────

  auth-bootstrap:
    session: FlamAuthBootstrap
    command: >
      VAULT_ADDR=${VAULT_ADDR}
      VAULT_TOKEN=${VAULT_TOKEN}
      ENV_FILE=/sec/root/FLTM/auth-service/scripts/prod.env
      bash ./scripts/vault_bootstrap.sh &&
      touch /tmp/auth_bootstrapped
    dir: /sec/root/FLTM//sec/root/FLTM/auth-service/scripts
    health_check: "test -f /tmp/auth_bootstrapped"
    color: white
    critical: true
    tags: [setup]

  auth-service:
    session: FlamAuth
    command: >
      set -a &&
      source /sec/root/FLTM/auth-service/scripts/prod.env &&
      set +a &&
      ./auth-service
    dir: /sec/root/FLTM/auth-service/bin
    health_check: "curl -sf http://localhost:5500 -o /dev/null"
    color: red
    critical: true
    tags: [backend, auth]
    port: 5500
    depends_on:
      auth-bootstrap:
        condition: process_healthy
      dgraph-alpha:
        condition: process_healthy

  cf-auth:
    session: FlamTunnelAuth
    command: >
      cloudflared tunnel run --token ${AUTH_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa AUTH_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
  # CHAT
  # ─────────────────────────────

  chat:
    session: FlamChat
    command: "pnpm run dev"
    dir: /sec/root/FLTM/chat
    health_check: "curl -sf http://localhost:5200 -o /dev/null"
    color: cyan
    critical: false
    tags: [app, realtime]
    port: 5200

  cf-chat:
    session: FlamTunnelChat
    command: >
      cloudflared tunnel run --token ${CHAT_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa CHAT_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
  # MAPS
  # ─────────────────────────────

  maps:
    session: FlamMaps
    command: "pnpm run dev"
    dir: /sec/root/FLTM/maps
    health_check: "curl -sf http://localhost:5174 -o /dev/null"
    color: cyan
    critical: false
    tags: [maps, frontend]
    port: 5174

  cf-maps:
    session: FlamTunnelMaps
    command: >
      cloudflared tunnel run --token ${MAPS_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa MAPS_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
  # GAMES
  # ─────────────────────────────

  games:
    session: FlamGames
    command: "pnpm run dev"
    dir: /sec/root/FLTM/games
    health_check: "curl -sf http://localhost:5300 -o /dev/null"
    color: yellow
    critical: false
    tags: [games]
    port: 5300

  cf-games:
    session: FlamTunnelGames
    command: >
      cloudflared tunnel run --token ${GAMES_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa GAMES_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
  # HYPNTYZ
  # ─────────────────────────────

  hypntyz:
    session: FlamHypntyz
    command: "pnpm run dev"
    dir: /sec/root/FLTM/hypntyz
    health_check: "curl -sf http://localhost:5400 -o /dev/null"
    color: red
    critical: true
    tags: [ai, projection]
    port: 5400

  cf-hypntyz:
    session: FlamTunnelHypntyz
    command: >
      cloudflared tunnel run --token ${HYPNTYZ_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa HYPNTYZ_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
  # INGESTION
  # ─────────────────────────────

  ingestion:
    session: FlamIngestion
    command: "pnpm run dev"
    dir: /sec/root/FLTM/ingestion
    health_check: "curl -sf http://localhost:5600 -o /dev/null"
    color: white
    critical: true
    tags: [backend, ingestion]
    port: 5600

  cf-ingestion:
    session: FlamTunnelIngestion
    command: >
      cloudflared tunnel run --token ${INGESTION_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa INGESTION_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
  # CRM
  # ─────────────────────────────

  crm-frontend:
    session: FlamCRMFrontend
    command: "pnpm run dev"
    dir: /sec/root/FLTM/BottleCRM/frontend
    health_check: "curl -sf http://localhost:5173 -o /dev/null"
    color: blue
    critical: true
    tags: [crm, frontend]
    port: 5173

  crm-backend:
    session: FlamCRMBackend
    command: >
      bash -c "python manage.py migrate &&
               python manage.py runserver 0.0.0.0:8000"
    dir: /sec/root/FLTM/BottleCRM/backend
    health_check: "curl -sf http://localhost:8000/swagger-ui/ -o /dev/null"
    color: green
    critical: true
    tags: [crm, backend, api]
    port: 8000

  crm-celery:
    session: FlamCRMCelery
    command: >
      bash -c "source venv/bin/activate &&
               celery -A crm worker --loglevel=INFO"
    dir: /sec/root/FLTM/BottleCRM/backend
    health_check: "pgrep -fa 'celery -A crm'"
    color: red
    critical: true
    tags: [crm, worker, async]

  crm-redis:
    session: FlamCRMRedis
    command: "redis-server"
    dir: /
    health_check: "redis-cli ping"
    color: yellow
    critical: true
    tags: [crm, infra, redis]
    port: 6379

  cf-crm:
    session: FlamTunnelCRM
    command: >
      cloudflared tunnel run --token ${CRM_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa CRM_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel, crm]

  # ─────────────────────────────
  # MARKETING
  # ─────────────────────────────

  n8n:
    session: FlamN8n
    command: "n8n start"
    dir: /sec/root/FLTM/marketing
    health_check: "curl -sf http://localhost:5678 -o /dev/null"
    color: orange
    critical: false
    tags: [marketing, automation]
    port: 5678

  # ─────────────────────────────
  # AUTH STACK
  # Boot order: vault → dgraph-zero → dgraph-alpha → auth-bootstrap → auth-service
  # ─────────────────────────────

  vault:
    session: FlamVault
    command: "vault server -dev -dev-listen-address=0.0.0.0:8200"
    dir: /
    health_check: "curl -sf http://localhost:8200/v1/sys/health -o /dev/null"
    color: yellow
    critical: true
    tags: [infra, security]

  dgraph-zero:
    session: FlamDgraphZero
    command: "dgraph zero --my=localhost:5080"
    dir: /
    health_check: "curl -sf http://localhost:6080/state -o /dev/null"
    color: cyan
    critical: true
    tags: [infra, database]

  dgraph-alpha:
    session: FlamDgraphAlpha
    command: "dgraph alpha --my=localhost:7080 --zero=localhost:5080 --security 'whitelist=0.0.0.0/0'"
    dir: /
    health_check: "curl -sf http://localhost:8080/health -o /dev/null"
    color: blue
    critical: true
    tags: [infra, database]
    depends_on:
      dgraph-zero:
        condition: process_healthy

  auth-bootstrap:
    session: FlamAuthBootstrap
    command: >
      export VAULT_ADDR='http://localhost:8200' &&
      export VAULT_TOKEN='root' &&
      bash ./scripts/vault-bootstrap.sh > /tmp/bootstrap &&
      touch /tmp/auth_bootstrapped
    dir: /sec/root/FLTM/SHFTCCONK
    health_check: "test -f /tmp/auth_bootstrapped"
    color: white
    critical: true
    tags: [setup]
    depends_on:
      vault:
        condition: process_healthy


  # ─────────────────────────────
  # GATEBILL — KYC Engine
  # Boot order: auth-service → gatebill-frontend → workers
  # ─────────────────────────────

  gatebill-frontend:
    session: FlamGatebillFrontend
    command: "go run ./cmd/server/main.go"
    dir: /sec/root/FLTM/SHFTCCONK/gatebill
    health_check: "curl -sf http://localhost:9900/health -o /dev/null"
    color: green
    critical: true
    tags: [gatebill, kyc, frontend]
    port: 9900
    depends_on:
      auth-service:
        condition: process_healthy

  gatebill-worker-1:
    session: FlamGatebillWorker1
    command: "python3 src/workers/kyc_processor.py"
    dir: /sec/root/FLTM/SHFTCCONK/gatebill
    health_check: "pgrep -fa kyc_processor.py"
    color: yellow
    critical: true
    tags: [gatebill, kyc, worker]
    depends_on:
      gatebill-frontend:
        condition: process_started

  gatebill-worker-2:
    session: FlamGatebillWorker2
    command: "python3 src/workers/document_verifier.py"
    dir: /sec/root/FLTM/SHFTCCONK/gatebill
    health_check: "pgrep -fa document_verifier.py"
    color: magenta
    critical: false
    tags: [gatebill, kyc, worker]
    depends_on:
      gatebill-frontend:
        condition: process_started
