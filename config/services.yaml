
# ─────────────────────────────────────────────
#  FlamOS Service Registry
#  All services declared here. flam reads this.
# ─────────────────────────────────────────────

# ─────────────────────────────────────────────
# FlamOS Service Registry
# ─────────────────────────────────────────────

defaults:
  watchdog_interval: 10
  restart_limit: 5
  restart_cooldown: 30
  state_file: ./state/workspace.json
  log_dir: ./logs

services:

  nginx:
    session: FlamNginx
    command: "nginx -g 'daemon off;'"
    dir: /
    health_check: "service nginx status"
    color: green
    critical: true
    tags: [infra]
    log_file: /var/log/nginx/error.log

  # ─────────────────────────────
  # ROOT SITE
  # ─────────────────────────────

  root-web:
    session: FlamRootWeb
    command: "pnpm run dev"
    dir: /sec/root/FLTM/root-web
    health_check: "curl -sf http://localhost:5100 -o /dev/null"
    color: blue
    critical: true
    tags: [frontend]
    port: 5100

  cf-root:
    session: FlamTunnelRoot
    command: >
      cloudflared
      tunnel run
      --token ${ROOT_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa ROOT_TUNNEL_TOKEN"
    color: orange
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
