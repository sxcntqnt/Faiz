# ─────────────────────────────────────────────
#  FlamOS Service Registry
#  All services declared here. flam reads this.
# ─────────────────────────────────────────────

defaults:
  watchdog_interval: 10
  restart_limit: 5
  restart_cooldown: 30
  state_file: ./state/workspace.json
  log_dir: ./logs

# ─────────────────────────────────────────────
#  Groups — explicit named collections.
#  Use with any flam command:
#    flam up apps
#    flam doctor crm
#    flam panic pangea
#    flam watch tunnels
# ─────────────────────────────────────────────

groups:
  apps:       [root-web, auth-service, chat, maps, games, hypntyz, ingestion, broker]
  gcdf:        [gcdf-frontend, gcdf-backend, gcdf-celery, gcdf-redis, cf-gcdf]
  marketing:  [n8n]
  auth-stack: [vault, dgraph-zero, dgraph-alpha, auth-bootstrap, auth-service]
  gatebil:   [gatebil-frontend, gatebil-backend, cf-gatebil]
  tunnels:    [cf-root, cf-auth, cf-chat, cf-maps, cf-games, cf-hypntyz,
               cf-ingestion, cf-gcdf, cf-gatebil]
  infra:      [nginx, vault, dgraph-zero, dgraph-alpha, broker]

services:

  # ─────────────────────────────
  # INFRA
  # ─────────────────────────────

  nginx:
    session: FlamNginx
    command: "nginx -g 'daemon off;'"
    dir: /
    health_check: "service nginx status"
    color: green
    critical: true
    tags: [infra]
    log_file: /var/log/nginx/error.log

  # ─────────────────────────────
  # ROOT SITE
  # ─────────────────────────────

  root-web:
    session: FlamRootWeb
    command: "pnpm run prod-start"
    dir: /sec/root/FLTM/SHFTCCONK
    health_check: "curl -s http://localhost:4173 -o /dev/null"
    color: blue
    critical: true
    tags: [frontend]
    port: 4173

  cf-root:
    session: FlamTunnelRoot
    command: >
      cloudflared tunnel run --token ${ROOT_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa ROOT_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
  # AUTH
  # ─────────────────────────────

  auth-bootstrap:
    session: FlamAuthBootstrap
    command: >
      VAULT_ADDR=${VAULT_ADDR}
      VAULT_TOKEN=${VAULT_TOKEN}
      ENV_FILE=/sec/root/FLTM/auth-service/scripts/prod.env
      bash ./scripts/vault_bootstrap.sh &&
      touch /tmp/auth_bootstrapped
    dir: /sec/root/FLTM/auth-service
    health_check: "test -f /tmp/auth_bootstrapped"
    color: white
    critical: true
    tags: [setup]

  auth-service:
    session: FlamAuth
    command: >
      set -a &&
      source /sec/root/FLTM/auth-service/scripts/prod.env &&
      set +a &&
      ./auth-service
    dir: /sec/root/FLTM/auth-service/bin
    health_check: "curl -sf http://localhost:8980/health -o /dev/null"
    color: red
    critical: true
    tags: [backend, auth]
    port: 8980
    depends_on:
      dgraph-zero:
        condition: process_healthy
      dgraph-alpha:
        condition: process_healthy

  cf-auth:
    session: FlamTunnelAuth
    command: >
      cloudflared tunnel run --token ${AUTH_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa AUTH_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
  # CHAT
  # ─────────────────────────────

  chat:
    session: FlamChat
    command: >
      set -a &&
      source /sec/root/FLTM/Chapiana/.env &&
      set +a &&
      go run main.go --server=http
    dir: /sec/root/FLTM/Chapiana
    health_check: "curl -sf http://localhost:9200/health -o /dev/null"
    color: cyan
    critical: false
    tags: [app, realtime]
    port: 9200

  cf-chat:
    session: FlamTunnelChat
    command: >
      cloudflared tunnel run --token ${CHAT_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa CHAT_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
  # MAPS
  # ─────────────────────────────

  maps:
    session: FlamMaps
    command: "/sec/root/FLTM/indazon/bin/python run_server.py"
    dir: /sec/root/FLTM/HiMap
    health_check: "curl -s http://localhost:9910/health -o /dev/null"
    color: cyan
    critical: false
    tags: [maps, frontend]
    port: 9910

  cf-maps:
    session: FlamTunnelMaps
    command: >
      cloudflared tunnel run --token ${MAPS_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa MAPS_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
  # GAMES
  # ─────────────────────────────

  games:
    session: FlamGames
    command: "caddy run --config /sec/root/Builder/magari-server/Caddyfile"
    dir: /sec/root/FLTM/cars
    health_check: "curl -sf http://localhost:9940 -o /dev/null"
    color: yellow
    critical: false
    tags: [games]
    port: 9940

  cf-games:
    session: FlamTunnelGames
    command: >
      cloudflared tunnel run --token ${GAMES_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa GAMES_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
  # HYPNTYZ
  # ─────────────────────────────

  hypntyz:
    session: FlamHypntyz
    command: "./bin/hypntyz"
    dir: /sec/root/FLTM/hypntyz/
    health_check: "curl -sf http://localhost:8901/health -o /dev/null"
    color: red
    critical: true
    tags: [ai, projection]
    port: 8901

  cf-hypntyz:
    session: FlamTunnelHypntyz
    command: >
      cloudflared tunnel run --token ${HYPNTYZ_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa HYPNTYZ_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
  # INGESTION
  # ─────────────────────────────

  ingestion:
    session: FlamIngestion
    command: "yes yes |bash S1RT3.sh"
    dir: /sec/root/FLTM/Sirt3B3s1n
    health_check: "curl -sf http://localhost:7070/health -o /dev/null"
    color: white
    critical: true
    tags: [backend, ingestion]
    port: 7070

  cf-ingestion:
    session: FlamTunnelIngestionControl
    command: >
      cloudflared tunnel run --token ${INGESTION_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa INGESTION_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel]

  # ─────────────────────────────
  # INGESTION STACK
  # Boot order: rmqtt --> redis --> clickhouse
  # ─────────────────────────────

  broker:
    session: FlamBroker
    command: |
      ./bin/rmqttd -f ./etc/rmqtt.toml &
      RMQTT_PID=$!
      while kill -0 $RMQTT_PID 2>/dev/null; do
        echo "$(date) rmqtt alive [pid $RMQTT_PID]"
        sleep 60
      done
      echo "$(date) rmqtt exited"
    dir: /sec/root/FLTM/rmqtt
    health_check: "curl -sf http://127.0.0.1:6060/api/v1/health/check -o /dev/null"
    color: yellow
    critical: true
    tags: [infra, security]

  redis-cluster:
    session: FlamRedisCluster
    command: |
      bash create-cluster.sh start &&
      sleep 5 &&
      bash create-cluster.sh create -f &&
      while redis-cli -p ${REDIS_PORT} ping >/dev/null 2>&1; do
        echo "$(date) redis alive"
        sleep 60
      done
    dir: /sec/root/FLTM/js_osr/redis-supp
    health_check: "pgrep -fa redis | grep 3000"  
    color: yellow
    critical: true
    tags: [infra, security]

  clickhouse:
    session: FlamClickhouse
    command: |
      systemctl start clickhouse-server
      while ${CLICKHOUSE_TEST}; do
        echo "$(date) clickhouse alive"
        sleep 60
      done
    dir: /sec/root/FLTM
    health_check: "pgrep -fa clickhouse"  # health_check was cut off in source — fill in
    color: yellow
    critical: true
    tags: [infra, security]

  # ─────────────────────────────
  # RMQTT — Cloudflare Tunnel
  # ─────────────────────────────

  cf-broker:
    session: FlamTunnelBroker
    command: >
      cloudflared tunnel run --token ${BROKER_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa RMQTT_TUNNEL_TOKEN"
    color: yellow
    critical: true
    tags: [tunnel, rmqtt, mqtt, broker]
    depends_on:
      rmqtt:
        condition: process_started

  # ─────────────────────────────
  # CRM
  # ─────────────────────────────

  gcdf-frontend:
    session: FlamCRMFrontend
    command: "pnpm run prod-start"
    dir: /sec/root/FLTM/GrauCena/frontend
    health_check: "curl -s http://localhost:10420 -o /dev/null"
    color: blue
    critical: true
    tags: [crm, frontend]
    port: 10420

  gcdf-backend:
    session: FlamCRMBackend
    command: >
      bash -c "uv run manage.py migrate &&
               uv run manage.py runserver 0.0.0.0:10421"
    dir: /sec/root/FLTM/GrauCena/backend
    health_check: "curl -s http://localhost:10421/swagger-ui/ -o /dev/null"
    color: green
    critical: true
    tags: [crm, backend, api]
    port: 10421

  gcdf-celery:
    session: FlamCRMCelery
    command: >
      bash -c "uv run celery -A crm worker --loglevel=INFO"
    dir: /sec/root/FLTM/GrauCena/backend
    health_check: "pgrep -fa celery | grep uv"
    color: red
    critical: true
    tags: [crm, worker, async]

  gcdf-redis:
    session: FlamCRMRedis
    command: "redis-server redis.conf"
    dir: /sec/root/FLTM/reverseP/Wozniak
    health_check: "pgrep -fa redis | grep 6379"
    color: yellow
    critical: true
    tags: [crm, infra, redis]
    port: 6379

  cf-gcdf:
    session: FlamTunnelCRM
    command: >
      cloudflared tunnel run --token ${CRM_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa CRM_TUNNEL_TOKEN"
    color: magenta
    critical: true
    tags: [tunnel, crm]

  # ─────────────────────────────
  # MARKETING
  # ─────────────────────────────

  n8n:
    session: FlamN8n
    command: "n8n start"
    dir: /sec/root/FLTM/marketing
    health_check: "curl -sf http://localhost:5678 -o /dev/null"
    color: orange
    critical: false
    tags: [marketing, automation]
    port: 5678

  # ─────────────────────────────
  # AUTH STACK
  # Boot order: vault → dgraph-zero → dgraph-alpha → auth-bootstrap → auth-service
  # ─────────────────────────────

  vault:
    session: FlamVault
    command: "vault server -dev -dev-listen-address=0.0.0.0:8200"
    dir: /
    health_check: "curl -s http://localhost:8200/v1/sys/health -o /dev/null"
    color: yellow
    critical: true
    tags: [infra, security]
    port: 8200

  dgraph-zero:
    session: FlamDgraphZero
    command: "dgraph zero --my=localhost:5080"
    dir: /
    health_check: "curl -sf http://localhost:6080/state -o /dev/null"
    color: cyan
    critical: true
    tags: [infra, database]

  dgraph-alpha:
    session: FlamDgraphAlpha
    command: "dgraph alpha --my=localhost:7080 --zero=localhost:5080 --security 'whitelist=0.0.0.0/0'"
    dir: /
    health_check: "curl -sf http://localhost:8080/health -o /dev/null"
    color: blue
    critical: true
    tags: [infra, database]
    depends_on:
      dgraph-zero:
        condition: process_healthy

  # ─────────────────────────────
  # Gatebil — KYC Engine
  # Boot order: auth-service → gatebil-frontend → workers
  # ─────────────────────────────

  gatebil-frontend:
    session: FlamGatebilFrontend
    command: >
      set -a &&
      source /sec/root/FLTM/Gatebil/frontend/.prod.env &&
      set +a &&
      exec make run
    dir: /sec/root/FLTM/Gatebil/frontend
    health_check: "curl -sf http://localhost:9930/healthz -o /dev/null"
    color: green
    critical: true
    tags: [gatebil, kyc, frontend]
    port: 9900
    depends_on:
      gatebil-backend:
        condition: process_healthy

  gatebil-backend:
    session: FlamGatebillBackend
    command: >
      set -a &&
      source /sec/root/FLTM/Gatebil/nosos/bin/activate 
      set +a &&
      python3 main.py
    dir: /sec/root/FLTM/Gatebil/backend
    health_check: "curl -s http://localhost:5000/internal/v1/health -o /dev/null"
    color: yellow
    critical: true
    tags: [gatebil, kyc, worker]
    port: 5000
    

  cf-gatebil:
    session: FlamTunnelGatebil
    command: >
      cloudflared tunnel run --token ${GATEBIL_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa SH3K3M_TUNNEL_TOKEN"
    color: cyan
    critical: true
    tags: [tunnel, gatebil]
    depends_on:
     gatebil-frontend:
       condition: process_started

  
  # ─────────────────────────────
  # SH3K3M — ETA Engine
  # Boot order: sh3k3m
  # ─────────────────────────────

  sh3k3m:
    session: FlamSh3k3m
    command: >
      set -a &&
      source /sec/root/FLTM/sh3k3m/.prod.env &&
      set +a &&
      bash start.sh bootstrap
    dir: /sec/root/FLTM/sh3k3m
    health_check: "curl -sf http://localhost:8080/health -o /dev/null"
    color: cyan
    critical: true
    tags: [sh3k3m, eta, routing]
    port: 8080

  # ─────────────────────────────
  # SH3K3M — Cloudflare Tunnel
  # ─────────────────────────────

  cf-sh3k3m:
    session: FlamTunnelSh3k3m
    command: >
      cloudflared tunnel run --token ${SH3K3M_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa SH3K3M_TUNNEL_TOKEN"
    color: cyan
    critical: true
    tags: [tunnel, sh3k3m]
    depends_on:
      sh3k3m:
        condition: process_started

  # ─────────────────────────────
  # GUELMIMASAFI — MQTT Engine
  # Boot order: scylladb → guelmimasafi
  # ─────────────────────────────
  scylladb:
    session: FlamScyllaDB

    command: |-
      while sh -c ${SCYLLA_TEST}; do
        echo "$(date) SCYLLA alive"
        sleep 60
      done
    dir: ${FLAM_ROOT}
    health_check: "${SCYLLA_HEALTH}"
    color: red
    critical: true
    tags: [database, scylla, tailscale, cluster]
    port: 9042

  guelmimasafi:
    session: FlamGuelmimAsafi
    command: >
      ALL_PROXY=${ALL_PROXY}
      HTTP_PROXY=${HTTP_PROXY}
      http_proxy=${http_proxy}
      _build/default/rel/himap_hann/bin/himap_hann foreground
    dir: /sec/root/FLTM/GuelminAsafi
    health_check: "curl -sf http://localhost:9950/health -o /dev/null"
    color: blue
    critical: true
    tags: [guelmimasafi, mqtt, erlang]
    depends_on:
      scylladb:
        condition: process_healthy

  # ─────────────────────────────
  # GUELMIMASAFI — Cloudflare Tunnel
  # ─────────────────────────────

  cf-guelmimasafi:
    session: FlamTunnelGuelmimAsafi
    command: >
      cloudflared tunnel run --token ${GUELMIMASAFI_TUNNEL_TOKEN}
    dir: /
    health_check: "pgrep -fa GUELMIMASAFI_TUNNEL_TOKEN"
    color: blue
    critical: true
    tags: [tunnel, guelmimasafi]
    depends_on:
      guelmimasafi:
        condition: process_started
