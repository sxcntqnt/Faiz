    dir: /sec/root/FLTM/SHFTCCONK/gatebill
    health_check: "curl -sf http://localhost:9900/health -o /dev/null"
    color: green
    critical: true
    tags: [gatebill, kyc, frontend]
    port: 9900
    depends_on:
      auth-service:
        condition: process_healthy

  gatebill-worker-1:
    session: FlamGatebillWorker1
    command: "python3 src/workers/kyc_processor.py"
    dir: /sec/root/FLTM/SHFTCCONK/gatebill
    health_check: "pgrep -fa kyc_processor.py"
    color: yellow
    critical: true
    tags: [gatebill, kyc, worker]
    depends_on:
      gatebill-frontend:
        condition: process_started

  gatebill-worker-2:
    session: FlamGatebillWorker2
    command: "python3 src/workers/document_verifier.py"
    dir: /sec/root/FLTM/SHFTCCONK/gatebill
    health_check: "pgrep -fa document_verifier.py"
    color: magenta
    critical: false
    tags: [gatebill, kyc, worker]
